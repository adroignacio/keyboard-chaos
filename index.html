<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Chaos</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #08080f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ===== SELECTION ===== */
    #screen-select {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 2.5rem;
      padding: 2rem;
    }

    .title {
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -1px;
      text-align: center;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      color: #555;
      margin-top: -1.5rem;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      max-width: 820px;
    }

    .card {
      width: clamp(108px, 17vw, 148px);
      padding: 1.4rem 0.9rem 1.2rem;
      background: #12121e;
      border: 2px solid #1e1e35;
      border-radius: 18px;
      text-align: center;
      cursor: pointer;
      transition: transform .18s, border-color .18s, box-shadow .18s, background .18s;
      user-select: none;
    }
    .card:hover { border-color: #3a3a5e; transform: translateY(-6px) scale(1.02); }
    .card.selected {
      border-color: #7c3aed;
      background: #1a1235;
      box-shadow: 0 0 28px rgba(124,58,237,.45), inset 0 0 20px rgba(124,58,237,.12);
      transform: translateY(-6px) scale(1.04);
    }
    .card-emoji { font-size: clamp(2.4rem, 5vw, 3.3rem); display: block; margin-bottom: .5rem; line-height: 1; }
    .card-name  { font-size: clamp(.78rem,1.4vw,.92rem); font-weight: 600; color: #bbb; }
    .card-age   { font-size: .68rem; color: #484858; margin-top: .2rem; }

    #btn-activate {
      padding: .85rem 2.8rem;
      font-size: clamp(.95rem,2.2vw,1.25rem);
      font-weight: 700;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all .2s;
      opacity: .35;
      pointer-events: none;
      letter-spacing: .2px;
      font-family: inherit;
    }
    #btn-activate.ready {
      opacity: 1;
      pointer-events: all;
      box-shadow: 0 4px 26px rgba(124,58,237,.5);
    }
    #btn-activate.ready:hover { background: #6d28d9; transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 34px rgba(124,58,237,.6); }
    #btn-activate.ready:active { transform: scale(.98); }

    /* ===== CHAOS ===== */
    #screen-chaos { display: none; position: fixed; inset: 0; }
    #chaos-canvas { display: block; width: 100%; height: 100%; }

    .hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 13px 15px;
      pointer-events: none;
      z-index: 10;
    }
    #btn-back {
      padding: 7px 15px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.65);
      border-radius: 10px;
      cursor: pointer;
      font-size: .8rem;
      font-family: inherit;
      pointer-events: all;
      transition: background .2s, color .2s;
    }
    #btn-back:hover { background: rgba(255,255,255,.18); color: #fff; }
    #profile-label {
      padding: 7px 13px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 10px;
      font-size: .8rem;
      color: rgba(255,255,255,.6);
    }
  </style>
</head>
<body>

<!-- SELECTION -->
<div id="screen-select">
  <h1 class="title">⌨️ Keyboard Chaos</h1>
  <p class="subtitle">Elige un perfil y ¡desata el caos!</p>
  <div class="cards">
    <div class="card" data-profile="baby">
      <span class="card-emoji">👶</span>
      <span class="card-name">Bebé</span>
      <span class="card-age">0 – 1 año</span>
    </div>
    <div class="card" data-profile="pequeno">
      <span class="card-emoji">🧒</span>
      <span class="card-name">Pequeño</span>
      <span class="card-age">1 – 2 años</span>
    </div>
    <div class="card" data-profile="explorer">
      <span class="card-emoji">🧒</span>
      <span class="card-name">Explorer</span>
      <span class="card-age">2 – 4 años</span>
    </div>
    <div class="card" data-profile="gato">
      <span class="card-emoji">🐱</span>
      <span class="card-name">Gato</span>
      <span class="card-age">&nbsp;</span>
    </div>
    <div class="card" data-profile="perro">
      <span class="card-emoji">🐶</span>
      <span class="card-name">Perro</span>
      <span class="card-age">&nbsp;</span>
    </div>
    <div class="card" data-profile="experiment">
      <span class="card-emoji">🧪</span>
      <span class="card-name">Experiment</span>
      <span class="card-age">&nbsp;</span>
    </div>
  </div>
  <button id="btn-activate">¡Activar! 🚀</button>
</div>

<!-- CHAOS -->
<div id="screen-chaos">
  <canvas id="chaos-canvas"></canvas>
  <div class="hud">
    <button id="btn-back">← Volver</button>
    <div id="profile-label"></div>
  </div>
</div>

<script>
'use strict';

// ============================================================
// UTILS
// ============================================================
const rnd  = (a, b) => a + Math.random() * (b - a);
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const sgn  = () => (Math.random() > .5 ? 1 : -1);

function pastel()  { return `hsl(${rnd(0,360)},70%,80%)`; }
function bright()  { return `hsl(${rnd(0,360)},100%,60%)`; }
function primary() { return pick(['#FF3B30','#34C759','#007AFF','#FF9500','#AF52DE','#FF2D55','#5AC8FA']); }

function emoji(ctx, ch, x, y, size, rot = 0, a = 1) {
  if (a <= 0) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, a);
  ctx.translate(x, y);
  if (rot) ctx.rotate(rot);
  ctx.font = `${size}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(ch, 0, 0);
  ctx.restore();
}

function displayKey(key) {
  const MAP = { ' ':'␣','Enter':'↵','Backspace':'⌫','Tab':'⇥',
                'ArrowUp':'↑','ArrowDown':'↓','ArrowLeft':'←','ArrowRight':'→' };
  return MAP[key] || (key.length === 1 ? key.toUpperCase() : key.slice(0,3).toUpperCase());
}

// ============================================================
// ===== BEBÉ EFFECTS =====
// ============================================================

// 1. Burbujas de colores suaves que flotan
function makeBubbles(W, H, _k) {
  const balls = Array.from({length: Math.floor(rnd(10,17))}, () => ({
    x: rnd(W*.05, W*.95),
    y: H + rnd(0, 70),
    r: rnd(10, 46),
    color: pastel(),
    vx: rnd(-45, 45),
    vy: rnd(-145, -55),
    life: 0,
    max: rnd(1.5, 3.2)
  }));
  return {
    done: false,
    update(dt) {
      let alive = 0;
      for (const b of balls) {
        b.life += dt; b.x += b.vx*dt; b.y += b.vy*dt; b.vy += 20*dt;
        if (b.life < b.max) alive++;
      }
      if (!alive) this.done = true;
    },
    draw(ctx) {
      for (const b of balls) {
        const a = Math.max(0, 1 - b.life/b.max);
        if (!a) continue;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        ctx.fillStyle = b.color; ctx.fill();
        ctx.beginPath(); ctx.arc(b.x - b.r*.3, b.y - b.r*.35, b.r*.26, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,.55)'; ctx.fill();
        ctx.restore();
      }
    }
  };
}

// 2. Formas geométricas simples que aparecen y se desvanecen
function makeGeometric(W, H, _k) {
  const shapes = Array.from({length: Math.floor(rnd(5,11))}, () => ({
    x: rnd(W*.05, W*.95), y: rnd(H*.05, H*.95),
    type: Math.floor(rnd(0, 3)),
    size: rnd(25, 85),
    color: pastel(),
    rot: rnd(0, Math.PI*2),
    rotV: rnd(-1.5, 1.5),
    life: 0, max: rnd(1, 2.8)
  }));
  return {
    done: false,
    update(dt) {
      let alive = 0;
      for (const s of shapes) { s.life += dt; s.rot += s.rotV*dt; if (s.life < s.max) alive++; }
      if (!alive) this.done = true;
    },
    draw(ctx) {
      for (const s of shapes) {
        if (s.life >= s.max) continue;
        const t = s.life/s.max;
        const a = Math.max(0, t < .2 ? t/.2 : t > .7 ? (1-t)/.3 : 1);
        ctx.save();
        ctx.globalAlpha = a;
        ctx.translate(s.x, s.y); ctx.rotate(s.rot);
        ctx.fillStyle = s.color;
        if (s.type === 0) {
          ctx.beginPath(); ctx.arc(0, 0, s.size/2, 0, Math.PI*2); ctx.fill();
        } else if (s.type === 1) {
          const h = s.size/2; ctx.fillRect(-h, -h, s.size, s.size);
        } else {
          ctx.beginPath();
          ctx.moveTo(0, -s.size/2); ctx.lineTo(s.size/2, s.size/2); ctx.lineTo(-s.size/2, s.size/2);
          ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      }
    }
  };
}

// 3. Destellos de colores pastel
function makePastelFlash(W, H, _k) {
  const color = pastel();
  let life = 0, max = rnd(.6, 1.1);
  return {
    done: false,
    update(dt) { life += dt; if (life >= max) this.done = true; },
    draw(ctx) {
      const t = life/max;
      const a = Math.max(0, t < .15 ? (t/.15)*.5 : (1-t)*.5);
      ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = color; ctx.fillRect(0, 0, W, H); ctx.restore();
    }
  };
}

// 4. Estrellas lentas
function makeSlowStars(W, H, _k) {
  const stars = Array.from({length: Math.floor(rnd(8,15))}, () => ({
    x: rnd(0, W), y: rnd(0, H),
    size: rnd(20, 58),
    color: pastel(),
    vx: rnd(-45, 45), vy: rnd(-28, 28),
    rot: rnd(0, Math.PI*2), rotV: rnd(-.7, .7),
    life: 0, max: rnd(2, 4.5)
  }));
  return {
    done: false,
    update(dt) {
      let alive = 0;
      for (const s of stars) {
        s.life += dt; s.x += s.vx*dt; s.y += s.vy*dt; s.rot += s.rotV*dt;
        if (s.life < s.max) alive++;
      }
      if (!alive) this.done = true;
    },
    draw(ctx) {
      for (const s of stars) {
        const a = Math.max(0, 1 - s.life/s.max);
        if (!a) continue;
        ctx.save();
        ctx.globalAlpha = a; ctx.translate(s.x, s.y); ctx.rotate(s.rot);
        ctx.fillStyle = s.color; ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const r = i%2 === 0 ? s.size/2 : s.size/5;
          const ang = (i*Math.PI)/5 - Math.PI/2;
          if (i===0) ctx.moveTo(Math.cos(ang)*r, Math.sin(ang)*r);
          else       ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }
  };
}

// ============================================================
// ===== PEQUEÑO EFFECTS =====
// ============================================================

// 1. Animales emoji que rebotan
function makeBouncingAnimals(W, H, _k) {
  const pool = ['🐻','🦊','🐼','🐨','🐸','🐧','🦄','🐯','🦁','🐮','🦋','🐙'];
  const items = Array.from({length: Math.floor(rnd(3,6))}, () => ({
    ch: pick(pool),
    x: rnd(70, W-70), y: rnd(70, H-70),
    vx: sgn()*rnd(80, 260), vy: sgn()*rnd(80, 260),
    size: rnd(55, 100),
    life: 0, max: rnd(2.5, 4.5)
  }));
  return {
    done: false,
    update(dt) {
      let alive = 0;
      for (const a of items) {
        a.life += dt; a.x += a.vx*dt; a.y += a.vy*dt;
        const r = a.size/2;
        if (a.x < r)   { a.x = r;   a.vx =  Math.abs(a.vx); }
        if (a.x > W-r) { a.x = W-r; a.vx = -Math.abs(a.vx); }
        if (a.y < r)   { a.y = r;   a.vy =  Math.abs(a.vy); }
        if (a.y > H-r) { a.y = H-r; a.vy = -Math.abs(a.vy); }
        if (a.life < a.max) alive++;
      }
      if (!alive) this.done = true;
    },
    draw(ctx) {
      for (const a of items) {
        const t = a.life/a.max;
        emoji(ctx, a.ch, a.x, a.y, a.size, 0, Math.max(0, t > .78 ? (1-t)/.22 : 1));
      }
    }
  };
}

// 2. Explosión de confetti de colores primarios
function makeConfetti(W, H, _k) {
  const cx = W/2, cy = H/2;
  const p = Array.from({length: 75}, () => {
    const ang = rnd(0, Math.PI*2), spd = rnd(100, 480);
    return {
      x: cx, y: cy,
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - rnd(60,180),
      w: rnd(6,15), h: rnd(4,10),
      color: primary(),
      rot: rnd(0, Math.PI*2), rotV: rnd(-7,7),
      life: 0, max: rnd(1.5, 3.8)
    };
  });
  return {
    done: false,
    update(dt) {
      let alive = 0;
      for (const q of p) {
        q.life += dt; q.x += q.vx*dt; q.y += q.vy*dt;
        q.vy += 440*dt; q.rot += q.rotV*dt;
        if (q.life < q.max) alive++;
      }
      if (!alive) this.done = true;
    },
    draw(ctx) {
      for (const q of p) {
        const a = Math.max(0, 1 - q.life/q.max);
        if (!a) continue;
        ctx.save();
        ctx.globalAlpha = a; ctx.translate(q.x, q.y); ctx.rotate(q.rot);
        ctx.fillStyle = q.color; ctx.fillRect(-q.w/2, -q.h/2, q.w, q.h);
        ctx.restore();
      }
    }
  };
}

// 3. Letra gigante de la tecla presionada
function makeGiantKey(W, H, k) {
  const char = displayKey(k);
  const size = Math.min(W, H) * .44;
  const color = bright();
  let life = 0, max = 1.8;
  return {
    done: false,
    update(dt) { life += dt; if (life >= max) this.done = true; },
    draw(ctx) {
      const t = life/max;
      const a = Math.max(0, t < .1 ? t/.1 : 1-t);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(W/2, H/2); ctx.scale(1 + t*.4, 1 + t*.4);
      ctx.font = `900 ${size}px system-ui, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(255,255,255,.2)'; ctx.lineWidth = 7; ctx.strokeText(char, 0, 0);
      ctx.fillStyle = color; ctx.fillText(char, 0, 0);
      ctx.restore();
    }
  };
}

// 4. Arcoíris que cruza la pantalla
function makeRainbow(W, H, _k) {
  let life = 0, max = 2.6;
  const COLORS = ['#FF0000','#FF7F00','#FFFF00','#00CC00','#0055FF','#8B00FF'];
  const cx = W/2, cy = H * 1.82;
  const bandW = H * .046, rBase = H * 1.42;
  return {
    done: false,
    update(dt) { life += dt; if (life >= max) this.done = true; },
    draw(ctx) {
      const t = life/max;
      const a = Math.max(0, t < .14 ? t/.14 : t > .55 ? 1-(t-.55)/.45 : 1);
      ctx.save();
      ctx.globalAlpha = a * .88;
      for (let i = 0; i < COLORS.length; i++) {
        ctx.beginPath();
        ctx.arc(cx, cy, rBase + i*bandW, Math.PI, 0, true);
        ctx.strokeStyle = COLORS[i]; ctx.lineWidth = bandW*1.15; ctx.stroke();
      }
      ctx.restore();
    }
  };
}

// ============================================================
// ===== EXPLORER EFFECTS =====
// ============================================================

// 1. Fuegos artificiales
function makeFireworks(W, H, _k) {
  const bursts = Array.from({length: Math.floor(rnd(2,4))}, () => {
    const sx = rnd(W*.18, W*.82), peakY = rnd(H*.05, H*.38);
    const color = bright(), delay = rnd(0,.5), riseT = rnd(.35,.7);
    return { sx, peakY, color, delay, riseT, life: -delay, exploded: false, parts: [] };
  });
  let elapsed = 0, max = 3.8;
  return {
    done: false,
    update(dt) {
      elapsed += dt;
      if (elapsed >= max) { this.done = true; return; }
      for (const b of bursts) {
        b.life += dt;
        if (b.life < 0) continue;
        if (!b.exploded && b.life >= b.riseT) {
          b.exploded = true;
          for (let i = 0; i < 48; i++) {
            const ang = (i/48)*Math.PI*2, spd = rnd(80,280);
            b.parts.push({
              x: b.sx, y: b.peakY,
              vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
              r: rnd(2,5.5),
              color: Math.random() > .3 ? b.color : bright(),
              life: 0, max: rnd(.5,2)
            });
          }
        }
        for (const p of b.parts) {
          p.life += dt; p.x += p.vx*dt; p.y += p.vy*dt;
          p.vy += 280*dt; p.vx *= .984; p.vy *= .992;
        }
      }
    },
    draw(ctx) {
      for (const b of bursts) {
        if (b.life < 0) continue;
        if (!b.exploded) {
          const t = Math.min(1, b.life/b.riseT);
          const ry = H + (b.peakY - H)*t;
          ctx.save();
          ctx.fillStyle = b.color; ctx.shadowBlur = 14; ctx.shadowColor = b.color;
          for (let i = 0; i <= 5; i++) {
            const ty = Math.max(0, t - i*.055);
            const ty2 = H + (b.peakY - H)*ty;
            ctx.globalAlpha = (1-i/6)*.85;
            ctx.beginPath(); ctx.arc(b.sx, ty2, Math.max(1, 4-i*.55), 0, Math.PI*2); ctx.fill();
          }
          ctx.restore();
        }
        for (const p of b.parts) {
          const a = Math.max(0, 1-p.life/p.max);
          if (!a) continue;
          ctx.save();
          ctx.globalAlpha = a; ctx.fillStyle = p.color;
          ctx.shadowBlur = 8; ctx.shadowColor = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
      }
    }
  };
}

// 2. Rayos láser de colores
function makeLasers(W, H, _k) {
  const beams = Array.from({length: Math.floor(rnd(3,7))}, () => {
    const horiz = Math.random() > .5;
    const x1 = horiz ? 0 : rnd(0,W), y1 = horiz ? rnd(0,H) : 0;
    const x2 = horiz ? W : rnd(0,W), y2 = horiz ? rnd(0,H) : H;
    return { x1,y1,x2,y2, color: bright(), delay: rnd(0,.45), life: 0, max: rnd(.3,.75), w: rnd(2,7) };
  });
  const totalMax = Math.max(...beams.map(b => b.delay+b.max)) + .12;
  let elapsed = 0;
  return {
    done: false,
    update(dt) {
      elapsed += dt;
      if (elapsed >= totalMax) { this.done = true; return; }
      for (const b of beams) if (elapsed > b.delay) b.life = Math.min(b.max, elapsed-b.delay);
    },
    draw(ctx) {
      for (const b of beams) {
        if (b.life <= 0) continue;
        const a = Math.max(0, b.life < .08 ? b.life/.08 : 1 - (b.life-.08)/b.max);
        ctx.save();
        ctx.globalAlpha = Math.max(0, a); ctx.strokeStyle = b.color; ctx.lineWidth = b.w;
        ctx.shadowBlur = 28; ctx.shadowColor = b.color;
        ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(b.x2,b.y2); ctx.stroke();
        ctx.restore();
      }
    }
  };
}

// 3. Texto con la tecla que cae desde arriba con física
function makeFallingKey(W, H, k) {
  const char = displayKey(k);
  const size = rnd(60,125);
  const x = rnd(W*.08, W*.92);
  let y = -size, vy = rnd(0,80);
  const color = bright();
  let life = 0, max = 3.2, bounces = 0;
  return {
    done: false,
    update(dt) {
      life += dt; if (life >= max) { this.done = true; return; }
      vy += 680*dt; y += vy*dt;
      if (y > H - 12) {
        y = H - 12; vy *= -.52; bounces++;
        if (Math.abs(vy) < 60) vy = 0;
      }
    },
    draw(ctx) {
      const a = Math.max(0, life > max*.62 ? 1-(life-max*.62)/(max*.38) : 1);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.font = `900 ${size}px system-ui, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillStyle = color; ctx.shadowBlur = 20; ctx.shadowColor = color;
      ctx.fillText(char, x, y);
      ctx.restore();
    }
  };
}

// 4. Explosión de partículas
function makeParticleExplosion(W, H, _k) {
  const cx = rnd(W*.12, W*.88), cy = rnd(H*.12, H*.88);
  const parts = Array.from({length: 95}, () => {

  });
  return {
    done: false,
    update(dt) {
      let alive = 0;
      for (const p of parts) {
        p.life += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vx *= .962; p.vy *= .962;
        if (p.life < p.max) alive++;
      }
      if (!alive) this.done = true;

    draw(ctx) {
      for (const p of parts) {
        const a = Math.max(0, 1-p.life/p.max);

        ctx.save();
        ctx.globalAlpha = a; ctx.fillStyle = p.color;
        ctx.shadowBlur = 10; ctx.shadowColor = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();

      }
    }

// 3. Punto láser rojo que rebota
function makeLaserDot(W, H, _k) {
  let x = rnd(W*.18, W*.82), y = rnd(H*.18, H*.82);
  let vx = sgn()*rnd(260,520), vy = sgn()*rnd(220,440);
  const trail = [];
  let life = 0, max = rnd(2.2,4.5);
  return {
    done: false,
    update(dt) {
      life += dt; if (life >= max) { this.done = true; return; }
      trail.push({x,y}); if (trail.length > 20) trail.shift();
      x += vx*dt; y += vy*dt;
      if (x < 7)   { x = 7;   vx =  Math.abs(vx); }
      if (x > W-7) { x = W-7; vx = -Math.abs(vx); }
      if (y < 7)   { y = 7;   vy =  Math.abs(vy); }
      if (y > H-7) { y = H-7; vy = -Math.abs(vy); }
    },
    draw(ctx) {
      const a = Math.max(0, life > max*.78 ? (1-(life-max*.78)/(max*.22)) : 1);
      ctx.save();
      for (let i = 0; i < trail.length; i++) {
        ctx.globalAlpha = Math.max(0, (i/trail.length)*.32*a);
        ctx.fillStyle = '#FF3B30';
        ctx.beginPath(); ctx.arc(trail[i].x, trail[i].y, 3.5, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = Math.max(0, a);
      ctx.shadowBlur = 24; ctx.shadowColor = '#FF3B30';
      ctx.fillStyle = '#FF3B30';
      ctx.beginPath(); ctx.arc(x, y, 7.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFAAAA'; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(x-2, y-2, 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  };
}

function makeBouncingBall(W, H, _k) {
  const balls = Array.from({length: Math.floor(rnd(1,4))}, () => ({
    x: rnd(55, W-55), y: rnd(55, H/2),
    vx: sgn()*rnd(90,320), vy: rnd(-120,160),

      for (const b of balls) {

        if (b.x < r)   { b.x = r;   b.vx =  Math.abs(b.vx)*.84; }
        if (b.x > W-r) { b.x = W-r; b.vx = -Math.abs(b.vx)*.84; }
        if (b.y > H-r) { b.y = H-r; b.vy = -Math.abs(b.vy)*.68; b.vx *= .96; }
        if (b.life < b.max) alive++;
      }
      if (!alive) this.done = true;
    },
    draw(ctx) {
      for (const b of balls) {
        const a = Math.max(0, b.life > b.max*.82 ? (1-(b.life-b.max*.82)/(b.max*.18)) : 1);
        emoji(ctx, '🎾', b.x, b.y, b.size, 0, a);

    }
  };
}

let audioCtx = null;

function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function noise(a, dur) {
  const n = (a.sampleRate * dur) | 0;
  const buf = a.createBuffer(1, n, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const src = a.createBufferSource();
  src.buffer = buf;
  return src;
}

function conn(...nodes) {
  for (let i = 0; i < nodes.length - 1; i++) nodes[i].connect(nodes[i + 1]);
}

function playSoftBell() {
  const a = ac(), t = a.currentTime;
  [880, 1760, 2640].forEach((f, i) => {
    const o = a.createOscillator(), g = a.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(i === 0 ? 0.35 : 0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 2.2);
    conn(o, g, a.destination); o.start(t); o.stop(t + 2.3);
  });
}

  o.frequency.setValueAtTime(base, t);
  o.frequency.linearRampToValueAtTime(base * 1.12, t + 0.3);
  o.frequency.linearRampToValueAtTime(base, t + 0.65);
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.38, t + 0.05);
  g.gain.setValueAtTime(0.38, t + 0.6); g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
  conn(o, g, a.destination); o.start(t); o.stop(t + 0.75);
}

function playBallBounce() {
  const a = ac(), t = a.currentTime;
  // thump
  const src = noise(a, 0.09), flt = a.createBiquadFilter(), g = a.createGain();
  flt.type = 'lowpass'; flt.frequency.setValueAtTime(420, t); flt.frequency.exponentialRampToValueAtTime(80, t + 0.09);
  g.gain.setValueAtTime(0.9, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
  conn(src, flt, g, a.destination); src.start(t); src.stop(t + 0.1);
  // tonal
  const o = a.createOscillator(), og = a.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(130, t); o.frequency.exponentialRampToValueAtTime(55, t + 0.1);
  og.gain.setValueAtTime(0.45, t); og.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  conn(o, og, a.destination); o.start(t); o.stop(t + 0.12);
}

// Teclas con sonido: ~30% del teclado, distribuidas entre las 4 filas
// Fila números (12): 2,5,8     | Fila QWERTY (12): w,t,u,p
// Fila ASDF   (11): d,h,l     | Fila ZXCV   (10): x,b,.
// Espacio: ' '
const SOUND_KEYS = new Set(['2','5','8','w','t','u','p','d','h','l','x','b','.',' ']);

// ============================================================
// EXPERIMENT – assets y efectos

const dolphinImg = new Image();
dolphinImg.src = 'assets/images/dolphin.png';

let dolphinAudio = null;

function playDolphinSound() {
  if (!dolphinAudio) dolphinAudio = new Audio('assets/audio/dolphin.mp3');
  dolphinAudio.pause();
  dolphinAudio.currentTime = 0;
  dolphinAudio.play().catch(() => {});
}

function stopDolphinSound() {
  if (dolphinAudio) { dolphinAudio.pause(); dolphinAudio.currentTime = 0; }
}

function makeDolphin(W, H) {
  const imgH = Math.min(H * 0.18, 160);
  const ratio = (dolphinImg.complete && dolphinImg.naturalWidth > 0)
    ? dolphinImg.naturalWidth / dolphinImg.naturalHeight : 2.5;
  const imgW = imgH * ratio;
  // Velocidad: cruza toda la pantalla en 2 segundos
  const totalDist = W + imgW * 2;
  const speed = totalDist / 2;
  let x = -imgW * 0.5;
  const baseY = H * 0.8;

  return {
    done: false,
    update(dt) {
      x += speed * dt;
      if (x > W + imgW) this.done = true;
    },
    draw(ctx) {
      // Leve movimiento sinusoidal para simular nado
      const y = baseY + Math.sin((x / W) * Math.PI * 2.5) * 14;
      ctx.save();
      if (dolphinImg.complete && dolphinImg.naturalWidth > 0) {
        ctx.drawImage(dolphinImg, x - imgW / 2, y - imgH / 2, imgW, imgH);
      } else {
        ctx.font = `${imgH}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🐬', x, y);
      }
      ctx.restore();
    }
  };
}

// Teclas asignadas al delfín (5 teclas)
const EXPERIMENT_KEYS = new Set(['1','d','h','n',' ']);

// ── Toasty ──────────────────────────────────────────────────
const toastyImg = new Image();
toastyImg.src = 'assets/images/toasty.png';

let toastyAudio = null;

function playToastySound() {
  if (!toastyAudio) toastyAudio = new Audio('assets/audio/toasty.mp3');
  toastyAudio.pause();
  toastyAudio.currentTime = 0;
  toastyAudio.play().catch(() => {});
}

function stopToastySound() {
  if (toastyAudio) { toastyAudio.pause(); toastyAudio.currentTime = 0; }
}

function makeToasty(W, H) {
  const imgH = Math.min(H * 0.322, 230);
  const ratio = (toastyImg.complete && toastyImg.naturalWidth > 0)
    ? toastyImg.naturalWidth / toastyImg.naturalHeight : 1.2;
  const imgW = imgH * ratio;
  const slideDistance = W / 6;
  const y = H - imgH;              // anclada al fondo de la pantalla

  const slideIn  = 0.32;
  const hold     = 0.6;
  const slideOut = 0.32;
  const total    = slideIn + hold + slideOut;
  let life = 0;

  return {
    done: false,
    update(dt) { life += dt; if (life >= total) this.done = true; },
    draw(ctx) {
      // x = borde izquierdo de la imagen
      // inicio: W (fuera por la derecha)   pico: W - slideDistance
      let x;
      if (life < slideIn) {
        const t = life / slideIn;
        const ease = 1 - Math.pow(1 - t, 3);   // ease-out cúbico
        x = W - ease * slideDistance;
      } else if (life < slideIn + hold) {
        x = W - slideDistance;
      } else {
        const t = (life - slideIn - hold) / slideOut;
        const ease = t * t * t;                  // ease-in cúbico
        x = W - slideDistance + ease * slideDistance;
      }

      ctx.save();
      if (toastyImg.complete && toastyImg.naturalWidth > 0) {
        ctx.drawImage(toastyImg, x, y, imgW, imgH);
      } else {
        ctx.font = `bold ${imgH * 0.45}px system-ui`;
        ctx.fillStyle = '#FF6600';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillText('TOASTY!', x, H);
      }
      ctx.restore();
    }
  };
}

// Teclas asignadas a Toasty: t + 4 más distribuidas
const TOASTY_KEYS = new Set(['t','q','g','z','6']);

// ── Fire Fire ────────────────────────────────────────────────
const fireFireImg = new Image();
fireFireImg.src = 'assets/images/fire fire.png';

let fireFireAudio = null;

function playFireFireSound() {
  if (!fireFireAudio) fireFireAudio = new Audio('assets/audio/fire fire.mp3');
  fireFireAudio.pause();
  fireFireAudio.currentTime = 0;
  fireFireAudio.play().catch(() => {});
}

function stopFireFireSound() {
  if (fireFireAudio) { fireFireAudio.pause(); fireFireAudio.currentTime = 0; }
}

function makeFireFire(W, H) {
  const imgH = Math.min(H * 0.2, 160);
  const ratio = (fireFireImg.complete && fireFireImg.naturalWidth > 0)
    ? fireFireImg.naturalWidth / fireFireImg.naturalHeight : 1;
  const imgW = imgH * ratio;

  // Elegir lado de entrada al azar: 0=izq, 1=der, 2=arriba, 3=abajo
  const side = Math.floor(Math.random() * 4);
  const margin = 0.15;
  let cx1, cy1, cx2, cy2, flipH = false;

  if (side === 0) {                                    // Izquierda → Derecha
    const ry = rnd(H * margin, H * (1 - margin));
    cx1 = -imgW / 2;      cy1 = ry;
    cx2 = W + imgW / 2;   cy2 = H - ry;               // Y espejado alrededor del centro
  } else if (side === 1) {                             // Derecha → Izquierda
    const ry = rnd(H * margin, H * (1 - margin));
    cx1 = W + imgW / 2;   cy1 = ry;
    cx2 = -imgW / 2;      cy2 = H - ry;
    flipH = true;
  } else if (side === 2) {                             // Arriba → Abajo
    const rx = rnd(W * margin, W * (1 - margin));
    cx1 = rx;             cy1 = -imgH / 2;
    cx2 = W - rx;         cy2 = H + imgH / 2;          // X espejado alrededor del centro
  } else {                                             // Abajo → Arriba
    const rx = rnd(W * margin, W * (1 - margin));
    cx1 = rx;             cy1 = H + imgH / 2;
    cx2 = W - rx;         cy2 = -imgH / 2;
  }

  const duration = 2;
  let life = 0;

  return {
    done: false,
    update(dt) { life += dt; if (life >= duration) this.done = true; },
    draw(ctx) {
      const t = life / duration;
      const cx = cx1 + (cx2 - cx1) * t;
      const cy = cy1 + (cy2 - cy1) * t;

      ctx.save();
      ctx.translate(cx, cy);
      if (flipH) ctx.scale(-1, 1);
      if (fireFireImg.complete && fireFireImg.naturalWidth > 0) {
        ctx.drawImage(fireFireImg, -imgW / 2, -imgH / 2, imgW, imgH);
      } else {
        ctx.font = `${imgH}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🤖', 0, 0);
      }
      ctx.restore();
    }
  };
}

// Teclas asignadas a Fire Fire (5 teclas)
const FIRE_FIRE_KEYS = new Set(['3','w','f','b','8']);

// ============================================================
// PROFILES
// ============================================================
const PROFILES = {
  baby:       { name: '👶 Bebé',       effects: [makeBubbles, makeGeometric, makePastelFlash, makeSlowStars],              sounds: [playSoftBell, playXylophone, playRattle, playGentleChime] },
  pequeno:    { name: '🧒 Pequeño',    effects: [makeBouncingAnimals, makeConfetti, makeGiantKey, makeRainbow],             sounds: [playCartoonBoing, playCartoonSqueak, playHappyDing, playBubblePop] },
  explorer:   { name: '🧒 Explorer',   effects: [makeFireworks, makeLasers, makeFallingKey, makeParticleExplosion],         sounds: [playAmbulance, playFireTruck, playCarHorn, playRocketWhoosh] },
  gato:       { name: '🐱 Gato',       effects: [makeRunningMouse, makeSwimmingFish, makeLaserDot, makeFallingFeathers],    sounds: [playCatMeow, playBirdChirp, playPspsps, playCatPurr] },
  perro:      { name: '🐶 Perro',      effects: [makeBouncingBall, makeSpinningBone, makeRunningSquirrel, makePawPrints],   sounds: [playDogBark, playSqueakyToy, playWhistle, playBallBounce] },
  experiment: { name: '🧪 Experiment', effects: [], sounds: [] }
};

// ============================================================
// APP
// ============================================================
const $select  = document.getElementById('screen-select');
const $chaos   = document.getElementById('screen-chaos');
const $canvas  = document.getElementById('chaos-canvas');
const ctx      = $canvas.getContext('2d');
const $btnAct  = document.getElementById('btn-activate');
const $btnBack = document.getElementById('btn-back');
const $profLbl = document.getElementById('profile-label');

let selId         = null;
let profile       = null;
let profileId     = null;
let effects       = [];
let showHint      = true;
let animId        = null;
let lastTime      = null;
let lastKeyMs     = 0;

// Card selection
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selId = card.dataset.profile;
    $btnAct.classList.add('ready');
  });
});

$btnAct.addEventListener('click', () => { if (selId) enterChaos(selId); });
$btnBack.addEventListener('click', exitChaos);

function resizeCanvas() {
  $canvas.width  = window.innerWidth;
  $canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { if ($chaos.style.display !== 'none') resizeCanvas(); });

function enterChaos(id) {
  profileId = id;
  profile = PROFILES[id];
  $profLbl.textContent = profile.name;
  effects = []; showHint = true; lastTime = null;
  stopDolphinSound(); stopToastySound(); stopFireFireSound();
  $select.style.display = 'none';
  $chaos.style.display  = 'block';
  resizeCanvas();
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function exitChaos() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  stopDolphinSound(); stopToastySound(); stopFireFireSound();
  $chaos.style.display  = 'none';
  $select.style.display = 'flex';
}

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, .1);
  lastTime = ts;

  const W = $canvas.width, H = $canvas.height;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  effects = effects.filter(e => { e.update(dt); e.draw(ctx); return !e.done; });

  if (showHint) {
    const pulse = .42 + .42*Math.sin(ts/560);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.min(W/13, 54)}px system-ui, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Press any key...', W/2, H/2);
    ctx.restore();
  }

  animId = requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  if ($chaos.style.display === 'none') return;
  e.preventDefault();
  if (!profile) return;

  const now = performance.now();
  if (now - lastKeyMs < 65) return;
  lastKeyMs = now;

  showHint = false;
  const W = $canvas.width, H = $canvas.height;
  const keyLower = e.key.length === 1 ? e.key.toLowerCase() : e.key;

  // ── Experiment: lógica propia ──
  if (profileId === 'experiment') {
    if (EXPERIMENT_KEYS.has(keyLower)) {
      effects.push(makeDolphin(W, H));
      playDolphinSound();
    } else if (TOASTY_KEYS.has(keyLower)) {
      effects.push(makeToasty(W, H));
      playToastySound();
    } else if (FIRE_FIRE_KEYS.has(keyLower)) {
      effects.push(makeFireFire(W, H));
      playFireFireSound();
    }
    return;
  }

  // ── Otros perfiles ──
  effects.push(pick(profile.effects)(W, H, e.key));
  if (SOUND_KEYS.has(keyLower)) pick(profile.sounds)();
});
</script>
